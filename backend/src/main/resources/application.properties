# ═══════════════════════════════════════════════════════
# CampusFix v7 — SGSITS Indore
# Application Configuration
# ═══════════════════════════════════════════════════════
server.port=${PORT:8080}
spring.application.name=campusfix

# ── PostgreSQL ────────────────────────────────────────
# FIX: Use environment variables for production (Render/Railway)
# Local dev: set these in .env or use the defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/campusfix_db}}
spring.datasource.username=${DB_USER:campusfix_user}
spring.datasource.password=${DB_PASS:campusfix_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────
# none = schema.sql controls DDL. Use validate only after first successful deploy.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# ── Schema Initialization ────────────────────────────
# Spring will run schema.sql automatically on startup if tables are missing.
# Safe because we added IF NOT EXISTS to all statements.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.separator=;
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# ── JWT (24h token) ──────────────────────────────────
# FIX: Use env variable in production — never hardcode secrets
app.jwt.secret=${JWT_SECRET:CampusFix_SGSITS_Indore_Secret_Key_Must_Be_32_Characters_2026}
app.jwt.expiration-ms=86400000

# ── File Upload ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=${UPLOAD_DIR:uploads/photos}
app.upload.base-url=${BACKEND_URL:http://localhost:8080}/uploads

# ── CORS ─────────────────────────────────────────────
# FIX: Add production frontend URL (GitHub Pages / Netlify / Vercel)
# Set FRONTEND_URL env var on Render to your GitHub Pages URL
app.cors.origins=${FRONTEND_URL:http://localhost:3000},http://localhost:8080,http://localhost:5500,http://127.0.0.1:5500,http://localhost:63342,https://*.github.io,https://*.netlify.app,https://*.vercel.app

# ── Email (OTP delivery) ─────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:campusfix.sgsits@gmail.com}
# FIX: Use env variable — never commit app passwords to Git
spring.mail.password=${MAIL_PASSWORD:YOUR_GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=CampusFix SGSITS <${MAIL_USER:campusfix.sgsits@gmail.com}>
app.otp.expiry-minutes=10
app.otp.length=6

# ── Business Rules ────────────────────────────────────
app.auth.dob-format=ddMMyyyy
app.escalation.reporter-threshold=5
app.escalation.remind-auto-escalate=3
app.points.submit=10
app.points.photo=5
app.points.gps=5
app.points.comment=2
app.points.rate=5
app.points.co-report=5
app.points.closure-confirm=5
app.points.reminder=1
app.points.faculty-bonus=5

# ── Logging ───────────────────────────────────────────
logging.level.com.sgsits=INFO
logging.level.org.springframework.security=WARN


# ── Actuator (health check for Render/Railway deploy) ────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# ── WhatsApp ─────────────────────────────────────────
app.whatsapp.provider=${WHATSAPP_PROVIDER:wati}
app.whatsapp.wati.api-url=${WATI_API_URL:https://live-server-XXXX.wati.io}
app.whatsapp.wati.access-token=${WATI_TOKEN:YOUR_WATI_ACCESS_TOKEN}
app.whatsapp.webhook-verify-token=${WA_WEBHOOK_SECRET:campusfix_webhook_secret_2026}

# Staff WhatsApp numbers by category (set real numbers in env vars)
app.whatsapp.staff.electrical=${WA_ELECTRICAL:919876543210}
app.whatsapp.staff.plumbing=${WA_PLUMBING:919876543211}
app.whatsapp.staff.technical=${WA_TECHNICAL:919876543212}
app.whatsapp.staff.furniture=${WA_FURNITURE:919876543213}
app.whatsapp.staff.sanitation=${WA_SANITATION:919876543214}
app.whatsapp.staff.other=${WA_OTHER:919000000001}

# ── Deployment URLs (MUST set on Render dashboard) ────────────
# BACKEND_URL: your Render backend URL e.g. https://campusfix-backend.onrender.com
# FRONTEND_URL: your GitHub Pages URL e.g. https://yourusername.github.io/campusfix
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.frontend.url=${FRONTEND_URL:http://localhost:5500}

# ── IMPORTANT: File uploads on Render free tier ───────────────
# Render's free tier has ephemeral storage — uploaded files (photos, proof)
# are DELETED on every deploy/restart.
# For persistent uploads, set UPLOAD_DIR to a cloud storage path,
# or integrate AWS S3 / Cloudinary (future upgrade).
# For demo/presentation purposes, uploads work fine within a session.
